<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hexapod</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="info">connecting...</div>

    <!-- HUD overlay -->
    <div id="hud">
      <div id="hud-bat" class="hud-box">
        <div class="icon"><div class="fill" id="bat-fill"></div></div>
        <span id="bat-text">--</span>
      </div>
      <div id="hud-compass" class="hud-box">
        <div class="strip" id="compass-strip"></div>
        <div class="caret"></div>
      </div>
      <div id="hud-speed" class="hud-box">
        <div id="speed-val">0.0</div>
        <div style="font-size:9px;opacity:0.6">SPD</div>
      </div>
      <div id="hud-ahi" class="hud-box">
        <canvas id="ahi-canvas" width="100" height="100"></canvas>
      </div>
      <div id="hud-tilt" class="hud-box">
        <div id="tilt-roll">R 0.0</div>
        <div id="tilt-pitch">P 0.0</div>
      </div>
      <div id="hud-telemetry" class="hud-box">
        <div id="hud-clock">00:00:00</div>
        <div id="hud-uptime">UP 0s</div>
        <div id="hud-dist">DST 0.0</div>
        <div id="hud-phase">PH 0.00</div>
      </div>
      <div id="hud-right" class="hud-box">
        <div id="hud-hdg">HDG 0</div>
        <div id="hud-pos">POS 0,0</div>
        <div id="hud-fps">FPS --</div>
        <div id="hud-legs">LEGS 6/6</div>
      </div>
    </div>

    <!-- Control panel -->
    <div id="panel">
      <div class="section">body</div>
      <label>height</label>
      <input id="height" type="range" min="2" max="18" step="0.5" value="12" />
      <span class="v" id="height-v">12</span>
      <label>radius</label>
      <input id="radius" type="range" min="6" max="24" step="0.5" value="14" />
      <span class="v" id="radius-v">14</span>

      <div class="section">gait</div>
      <label>step</label>
      <input id="step" type="range" min="0.5" max="200" step="0.5" value="10" />
      <span class="v" id="step-v">10</span>
      <label>lift</label>
      <input id="lift" type="range" min="0.5" max="15" step="0.5" value="3" />
      <span class="v" id="lift-v">3</span>
      <label>cycle</label>
      <input id="cycle" type="range" min="0.2" max="4" step="0.1" value="0.6" />
      <span class="v" id="cycle-v">0.6</span>
      <label>speed</label>
      <input id="speed" type="range" min="1" max="30" step="1" value="15" />
      <span class="v" id="speed-v">15</span>

      <div class="section">foot override</div>
      <label>leg</label>
      <select id="target-leg" style="display:block;width:100%;margin-bottom:2px;
        background:#222;color:#ddd;border:1px solid #444;border-radius:3px;padding:3px;font:11px monospace">
        <option value="">-- off --</option>
        <option value="front_left">FL</option>
        <option value="front_right">FR</option>
        <option value="mid_left">ML</option>
        <option value="mid_right">MR</option>
        <option value="rear_left">RL</option>
        <option value="rear_right">RR</option>
      </select>
      <span></span>
      <label>x</label>
      <input id="tx" type="range" min="-25" max="30" step="0.5" value="17" />
      <span class="v" id="tx-v">17</span>
      <label>y</label>
      <input id="ty" type="range" min="-25" max="25" step="0.5" value="12" />
      <span class="v" id="ty-v">12</span>
      <label>z</label>
      <input id="tz" type="range" min="-10" max="20" step="0.5" value="0" />
      <span class="v" id="tz-v">0</span>

      <div class="section">hardware</div>
      <div style="display:flex;gap:6px;grid-column:span 3">
        <button id="servo-toggle" style="flex:1;color:#f44">OFF</button>
        <button id="zero-btn" style="flex:1">ZERO</button>
        <button id="lowpwr-btn" style="flex:1">LP</button>
        <button id="fpv-btn" style="flex:1">FPV</button>
        <button id="chase-btn" style="flex:1">3RD</button>
      </div>

      <div class="section">fpv sensitivity</div>
      <label>yaw</label>
      <input id="sens-yaw" type="range" min="1" max="100" step="1" value="5" />
      <span class="v" id="sens-yaw-v">5</span>
      <label>pitch</label>
      <input id="sens-pitch" type="range" min="1" max="20" step="1" value="4" />
      <span class="v" id="sens-pitch-v">4</span>
      <label>roll</label>
      <input id="sens-roll" type="range" min="1" max="20" step="1" value="6" />
      <span class="v" id="sens-roll-v">6</span>

      <div class="section">contacts</div>
      <div id="contacts" style="display:flex;gap:6px;flex-wrap:wrap;font:11px monospace;grid-column:span 3">
        <span class="c" data-leg="front_left">FL</span>
        <span class="c" data-leg="front_right">FR</span>
        <span class="c" data-leg="mid_left">ML</span>
        <span class="c" data-leg="mid_right">MR</span>
        <span class="c" data-leg="rear_left">RL</span>
        <span class="c" data-leg="rear_right">RR</span>
      </div>
    </div>

    <!-- Camera feed -->
    <div id="camera" style="display:none; position:absolute; bottom:8px; right:8px;">
      <img id="camera-feed" style="border-radius:4px; max-width:320px; display:block;" />
      <button id="camera-close" style="position:absolute; top:4px; right:4px;
        background:rgba(0,0,0,0.6); color:#ddd; border:none; border-radius:3px;
        cursor:pointer; font-size:14px; padding:2px 6px;">x</button>
    </div>

    <!-- Help -->
    <div id="help">
      <kbd>W</kbd><kbd>S</kbd> fwd/back
      <kbd>A</kbd><kbd>D</kbd> strafe
      <kbd>Q</kbd><kbd>E</kbd> turn
      <kbd>Space</kbd> stop
      <kbd>Shift</kbd>+mouse tilt
      <kbd>Esc</kbd> exit FPV
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
