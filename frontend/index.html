<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hexapod</title>
    <style>
      body { margin: 0; background: #111; color: #ddd; font-family: monospace; }
      #info { position: absolute; top: 8px; left: 8px; padding: 8px 10px;
              background: rgba(0,0,0,0.5); border-radius: 4px; font-size: 12px; }
      #help { position: absolute; bottom: 8px; left: 8px; padding: 8px 10px;
              background: rgba(0,0,0,0.5); border-radius: 4px; font-size: 11px; }
      #panel { position: absolute; top: 8px; right: 8px; padding: 10px 12px;
               background: rgba(0,0,0,0.6); border-radius: 4px; font-size: 12px;
               display: grid; grid-template-columns: auto 160px auto; gap: 6px 10px;
               align-items: center; }
      #panel input[type=range] { width: 160px; }
      #panel .v { font-variant-numeric: tabular-nums; min-width: 32px; text-align: right; }
      kbd { background: #333; padding: 1px 5px; border-radius: 3px; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="info">connecting…</div>
    <div id="panel">
      <label>height</label>
      <input id="height"  type="range" min="2"   max="18" step="0.5" value="12" />
      <span class="v" id="height-v">12</span>
      <label>step</label>
      <input id="step"    type="range" min="0.5" max="200" step="0.5" value="10" />
      <span class="v" id="step-v">10</span>
      <label>radius</label>
      <input id="radius"  type="range" min="6"   max="24" step="0.5" value="14" />
      <span class="v" id="radius-v">14</span>
      <hr style="opacity:0.3;margin:8px 0">
      <label>foot target</label>
      <select id="target-leg" style="display:block;width:100%;margin-bottom:4px">
        <option value="">— off (gait controls all) —</option>
        <option value="front_left">front_left</option>
        <option value="front_right">front_right</option>
        <option value="mid_left">mid_left</option>
        <option value="mid_right">mid_right</option>
        <option value="rear_left">rear_left</option>
        <option value="rear_right">rear_right</option>
      </select>
      <label>x</label>
      <input id="tx" type="range" min="-25" max="30" step="0.5" value="17" />
      <span class="v" id="tx-v">17</span>
      <label>y</label>
      <input id="ty" type="range" min="-25" max="25" step="0.5" value="12" />
      <span class="v" id="ty-v">12</span>
      <label>z</label>
      <input id="tz" type="range" min="-10" max="20" step="0.5" value="0" />
      <span class="v" id="tz-v">0</span>
      <hr style="opacity:0.3;margin:8px 0">
      <label>contacts</label>
      <div id="contacts" style="display:flex;gap:6px;flex-wrap:wrap;font:11px monospace">
        <span class="c" data-leg="front_left">FL</span>
        <span class="c" data-leg="front_right">FR</span>
        <span class="c" data-leg="mid_left">ML</span>
        <span class="c" data-leg="mid_right">MR</span>
        <span class="c" data-leg="rear_left">RL</span>
        <span class="c" data-leg="rear_right">RR</span>
      </div>
    </div>
    <style>
      #contacts .c {
        padding: 2px 6px; border-radius: 3px;
        background: #333; color: #888;
        border: 1px solid #555;
      }
      #contacts .c.on {
        background: #1a8a2a; color: #e8ffe8;
        border-color: #44ff66;
      }
    </style>
    <div id="camera" style="display:none; position:absolute; bottom:8px; right:8px;">
      <img id="camera-feed" style="border-radius:4px; max-width:320px; display:block;" />
      <button id="camera-close" style="position:absolute; top:4px; right:4px;
        background:rgba(0,0,0,0.6); color:#ddd; border:none; border-radius:3px;
        cursor:pointer; font-size:14px; padding:2px 6px;">x</button>
    </div>
    <div id="help">
      <kbd>W</kbd>/<kbd>S</kbd> forward/back &nbsp;
      <kbd>A</kbd>/<kbd>D</kbd> strafe &nbsp;
      <kbd>Q</kbd>/<kbd>E</kbd> turn &nbsp;
      <kbd>space</kbd> stop &nbsp;
      mouse drag to orbit
    </div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const info = document.getElementById("info");

      // ─── three.js scene ────────────────────────────────────────────
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111111);

      const camera = new THREE.PerspectiveCamera(
        45, window.innerWidth / window.innerHeight, 0.1, 1000
      );
      camera.position.set(40, 40, 40);
      camera.up.set(0, 0, 1);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0, 5);

      // ─── lighting ────────────────────────────────────────────────────
      const ambientLight = new THREE.AmbientLight(0x404050, 1.5);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
      dirLight.position.set(30, 20, 40);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(1024, 1024);
      dirLight.shadow.camera.left = -40;
      dirLight.shadow.camera.right = 40;
      dirLight.shadow.camera.top = 40;
      dirLight.shadow.camera.bottom = -40;
      dirLight.shadow.camera.near = 1;
      dirLight.shadow.camera.far = 100;
      scene.add(dirLight);

      const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
      fillLight.position.set(-20, -10, 15);
      scene.add(fillLight);

      // Ground grid + shadow plane.
      const grid = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
      grid.rotation.x = Math.PI / 2;     // make grid lie on z=0
      scene.add(grid);
      scene.add(new THREE.AxesHelper(8));

      const groundPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.ShadowMaterial({ opacity: 0.3 })
      );
      groundPlane.position.z = -0.01;
      groundPlane.receiveShadow = true;
      scene.add(groundPlane);

      // ─── hexapod model ─────────────────────────────────────────────
      const LEG_NAMES = [
        "front_left",  "front_right",
        "mid_left",    "mid_right",
        "rear_left",   "rear_right",
      ];

      const bodyGroup = new THREE.Group();
      scene.add(bodyGroup);

      // ── materials ──
      const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x2a2a2a, metalness: 0.4, roughness: 0.5,
      });
      const coxaMat = new THREE.MeshStandardMaterial({
        color: 0x555555, metalness: 0.3, roughness: 0.6,
      });
      const femurMat = new THREE.MeshStandardMaterial({
        color: 0x444444, metalness: 0.3, roughness: 0.6,
      });
      const tibiaMat = new THREE.MeshStandardMaterial({
        color: 0x333333, metalness: 0.3, roughness: 0.6,
      });
      const jointMat = new THREE.MeshStandardMaterial({
        color: 0x888888, metalness: 0.6, roughness: 0.3,
      });
      const footMatOff = new THREE.MeshStandardMaterial({
        color: 0xff5050, metalness: 0.2, roughness: 0.4,
      });
      const footMatOn = new THREE.MeshStandardMaterial({
        color: 0x44ff66, metalness: 0.2, roughness: 0.4, emissive: 0x114422, emissiveIntensity: 0.5,
      });

      // ── shared geometries ──
      // Unit cylinder along Y, centred at origin — we'll position/orient per frame.
      const segGeo = new THREE.CylinderGeometry(1, 1, 1, 8);
      const jointGeo = new THREE.SphereGeometry(1, 10, 8);
      const footGeo  = new THREE.SphereGeometry(1, 12, 8);

      // Body plate — built from the 6 coxa_start points each frame.
      const bodyMesh = new THREE.Mesh(new THREE.BufferGeometry(), bodyMat);
      bodyMesh.castShadow = true;
      bodyGroup.add(bodyMesh);

      // Forward direction indicator — small arrow on top of body.
      const arrowShape = new THREE.Shape();
      arrowShape.moveTo(0, 0);
      arrowShape.lineTo(-1.2, 2);
      arrowShape.lineTo(1.2, 2);
      arrowShape.closePath();
      const arrowGeo = new THREE.ExtrudeGeometry(arrowShape, {
        depth: 0.3, bevelEnabled: false,
      });
      const arrowMat = new THREE.MeshStandardMaterial({
        color: 0x44aaff, metalness: 0.3, roughness: 0.4,
      });
      const arrowMesh = new THREE.Mesh(arrowGeo, arrowMat);
      arrowMesh.castShadow = true;
      bodyGroup.add(arrowMesh);

      function makeSeg(mat, radius) {
        const m = new THREE.Mesh(segGeo, mat);
        m.castShadow = true;
        m.userData.radius = radius;
        bodyGroup.add(m);
        return m;
      }
      function makeJoint(mat, radius) {
        const m = new THREE.Mesh(jointGeo, mat);
        m.castShadow = true;
        m.scale.setScalar(radius);
        bodyGroup.add(m);
        return m;
      }

      // Per-leg solid parts.
      const legParts = {};
      const footMarkers = {};
      for (const name of LEG_NAMES) {
        const coxa  = makeSeg(coxaMat,  0.6);
        const femur = makeSeg(femurMat, 0.5);
        const tibia = makeSeg(tibiaMat, 0.4);
        const j1 = makeJoint(jointMat, 0.7);
        const j2 = makeJoint(jointMat, 0.6);
        const foot = new THREE.Mesh(footGeo, footMatOff);
        foot.castShadow = true;
        foot.scale.setScalar(0.5);
        bodyGroup.add(foot);
        footMarkers[name] = foot;
        legParts[name] = { coxa, femur, tibia, j1, j2, foot };
      }

      // Orient a unit cylinder from point A to point B.
      const _vA = new THREE.Vector3();
      const _vB = new THREE.Vector3();
      const _dir = new THREE.Vector3();
      const _yAxis = new THREE.Vector3(0, 1, 0);
      const _quat = new THREE.Quaternion();
      function positionSeg(mesh, a, b) {
        _vA.set(a[0], a[1], a[2]);
        _vB.set(b[0], b[1], b[2]);
        _dir.subVectors(_vB, _vA);
        const len = _dir.length();
        // Midpoint.
        mesh.position.lerpVectors(_vA, _vB, 0.5);
        // Quaternion that rotates Y-axis onto the A→B direction.
        _dir.normalize();
        _quat.setFromUnitVectors(_yAxis, _dir);
        mesh.quaternion.copy(_quat);
        mesh.scale.set(mesh.userData.radius, len, mesh.userData.radius);
      }

      // ─── support polygons (tripod groups) ──────────────────────────
      // Tripod gait groups, hardcoded — must match TripodGait.GROUPS in core.
      const TRIPOD_GROUPS = [
        { color: 0x4488ff, legs: ["front_right", "mid_left",  "rear_right"] },
        { color: 0xff8844, legs: ["front_left",  "mid_right", "rear_left"]  },
      ];
      const polyMeshes = TRIPOD_GROUPS.map((g) => {
        const geom = new THREE.BufferGeometry();
        geom.setAttribute("position", new THREE.BufferAttribute(new Float32Array(3 * 3), 3));
        geom.setIndex([0, 1, 2]);
        const mesh = new THREE.Mesh(
          geom,
          new THREE.MeshBasicMaterial({
            color: g.color, transparent: true, opacity: 0.25,
            side: THREE.DoubleSide, depthWrite: false,
          })
        );
        scene.add(mesh);
        // edge outline
        const edgeGeom = new THREE.BufferGeometry();
        edgeGeom.setAttribute("position", new THREE.BufferAttribute(new Float32Array(4 * 3), 3));
        const edge = new THREE.Line(edgeGeom, new THREE.LineBasicMaterial({ color: g.color }));
        scene.add(edge);
        return { mesh, edge };
      });

      function updatePolygons(state) {
        const pose = state.pose;
        const c = Math.cos(pose.yaw), s = Math.sin(pose.yaw);
        const toWorld = (b) => [
          pose.x + c * b[0] - s * b[1],
          pose.y + s * b[0] + c * b[1],
          0.02,                              // sit just above the grid
        ];
        TRIPOD_GROUPS.forEach((group, i) => {
          const feetWorld = group.legs.map((name) => toWorld(state.legs[name].foot));
          // Sort by angle around centroid for non-self-intersecting triangle.
          const cx = (feetWorld[0][0] + feetWorld[1][0] + feetWorld[2][0]) / 3;
          const cy = (feetWorld[0][1] + feetWorld[1][1] + feetWorld[2][1]) / 3;
          feetWorld.sort((a, b) =>
            Math.atan2(a[1] - cy, a[0] - cx) - Math.atan2(b[1] - cy, b[0] - cx)
          );
          const { mesh, edge } = polyMeshes[i];
          const arr = mesh.geometry.attributes.position.array;
          for (let k = 0; k < 3; k++) {
            arr[k * 3 + 0] = feetWorld[k][0];
            arr[k * 3 + 1] = feetWorld[k][1];
            arr[k * 3 + 2] = feetWorld[k][2];
          }
          mesh.geometry.attributes.position.needsUpdate = true;
          mesh.geometry.computeBoundingSphere();

          const earr = edge.geometry.attributes.position.array;
          for (let k = 0; k < 3; k++) {
            earr[k * 3 + 0] = feetWorld[k][0];
            earr[k * 3 + 1] = feetWorld[k][1];
            earr[k * 3 + 2] = feetWorld[k][2];
          }
          earr[9] = feetWorld[0][0];
          earr[10] = feetWorld[0][1];
          earr[11] = feetWorld[0][2];
          edge.geometry.attributes.position.needsUpdate = true;
        });
      }

      // World-space body trail.
      const trailMax = 600;
      const trailGeom = new THREE.BufferGeometry();
      trailGeom.setAttribute("position", new THREE.BufferAttribute(new Float32Array(trailMax * 3), 3));
      const trailLine = new THREE.Line(trailGeom, new THREE.LineBasicMaterial({ color: 0x66aaff }));
      scene.add(trailLine);
      let trailCount = 0;

      // ─── transform helpers ─────────────────────────────────────────
      // Body→world: rotate by yaw (about z), then translate by (x, y).
      function bodyToWorld(p, pose) {
        const c = Math.cos(pose.yaw), s = Math.sin(pose.yaw);
        return [
          pose.x + c * p[0] - s * p[1],
          pose.y + s * p[0] + c * p[1],
          p[2],
        ];
      }

      // Latest state snapshot — cached so the foot-target dropdown can prefill
      // its X/Y/Z sliders from the actual current neutral foot position of
      // whatever leg the user picks.
      let latestState = null;

      function applyState(state) {
        latestState = state;
        const pose = state.pose;
        bodyGroup.position.set(pose.x, pose.y, pose.z);
        bodyGroup.rotation.z = pose.yaw;

        // Body plate — extruded hex from the 6 coxa starts.
        const bodyVerts = LEG_NAMES.map((name) => {
          const cs = state.legs[name].coxa_start;
          return new THREE.Vector2(cs[0], cs[1]);
        });
        // Sort by angle around centroid for a clean polygon.
        const cx = bodyVerts.reduce((s, v) => s + v.x, 0) / 6;
        const cy = bodyVerts.reduce((s, v) => s + v.y, 0) / 6;
        bodyVerts.sort((a, b) =>
          Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx)
        );
        const bodyShape = new THREE.Shape(bodyVerts);
        bodyMesh.geometry.dispose();
        bodyMesh.geometry = new THREE.ExtrudeGeometry(bodyShape, {
          depth: 1.5, bevelEnabled: true, bevelThickness: 0.3,
          bevelSize: 0.3, bevelSegments: 2,
        });
        // Centre the extrude on Z, at the coxa mount height in bodyGroup-local coords.
        const mountZ = state.legs[LEG_NAMES[0]].coxa_start[2] - pose.z;
        bodyMesh.geometry.translate(0, 0, -0.75);
        bodyMesh.position.z = mountZ;

        // Forward arrow sits on top of the body plate, pointing +x.
        arrowMesh.position.set(4, 0, mountZ + 0.8);
        arrowMesh.rotation.z = Math.PI / 2;  // rotate so arrow tip points +x

        // Each leg as solid cylinder segments.
        LEG_NAMES.forEach((name) => {
          const leg = state.legs[name];
          if (!leg) return;
          const oz = (p) => [p[0], p[1], p[2] - pose.z];
          const p0 = oz(leg.coxa_start);
          const p1 = oz(leg.coxa_end);
          const p2 = oz(leg.femur_end);
          const p3 = oz(leg.foot);

          const parts = legParts[name];
          positionSeg(parts.coxa,  p0, p1);
          positionSeg(parts.femur, p1, p2);
          positionSeg(parts.tibia, p2, p3);

          parts.j1.position.set(p1[0], p1[1], p1[2]);
          parts.j2.position.set(p2[0], p2[1], p2[2]);

          parts.foot.position.set(p3[0], p3[1], p3[2]);
          parts.foot.material = leg.contact ? footMatOn : footMatOff;
        });

        updatePolygons(state);

        // Per-leg contact strip — turns green when the firmware reports the
        // bumper closed for that leg's bit in the feedback frame.
        document.querySelectorAll("#contacts .c").forEach((el) => {
          const name = el.dataset.leg;
          const on = state.legs[name] && state.legs[name].contact;
          el.classList.toggle("on", !!on);
        });

        // Trail in world frame.
        const tarr = trailGeom.attributes.position.array;
        const idx = (trailCount % trailMax) * 3;
        tarr[idx + 0] = pose.x;
        tarr[idx + 1] = pose.y;
        tarr[idx + 2] = 0;
        trailCount++;
        trailGeom.attributes.position.needsUpdate = true;
        trailGeom.setDrawRange(0, Math.min(trailCount, trailMax));

        info.textContent =
          `t=${state.t.toFixed(2)}  ` +
          `pose=(${pose.x.toFixed(1)}, ${pose.y.toFixed(1)}, yaw=${pose.yaw.toFixed(2)})  ` +
          `twist=(${state.twist.vx.toFixed(2)}, ${state.twist.vy.toFixed(2)}, ${state.twist.omega.toFixed(2)})`;
      }

      // ─── websocket ─────────────────────────────────────────────────
      const ws = new WebSocket(`ws://${location.hostname}:8765`);
      ws.onopen = () => { info.textContent = "connected"; };
      ws.onclose = () => { info.textContent = "disconnected"; };
      ws.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === "state") applyState(msg.data);
        if (msg.type === "config" && msg.camera_url) {
          const url = new URL(msg.camera_url);
          url.hostname = location.hostname;
          document.getElementById("camera-feed").src = url.toString();
          document.getElementById("camera").style.display = "block";
        }
      };

      document.getElementById("camera-close").onclick = () => {
        const cam = document.getElementById("camera");
        cam.style.display = cam.style.display === "none" ? "block" : "none";
      };

      function send(obj) {
        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
      }

      // ─── input ─────────────────────────────────────────────────────
      const keys = {};
      window.addEventListener("keydown", (e) => { keys[e.key.toLowerCase()] = true; pushTwist(); });
      window.addEventListener("keyup",   (e) => { keys[e.key.toLowerCase()] = false; pushTwist(); });

      function bindSlider(id, type, key) {
        const el = document.getElementById(id);
        const v  = document.getElementById(id + "-v");
        const send_ = () => {
          v.textContent = el.value;
          send({ type, [key]: parseFloat(el.value) });
        };
        el.addEventListener("input", send_);
        // push initial values once the socket opens
        ws.addEventListener("open", send_);
      }
      bindSlider("height", "set_height",        "z");
      bindSlider("step",   "set_step_length",   "length");
      bindSlider("radius", "set_stance_radius", "radius");

      // ─── foot target manual override ───────────────────────────────
      // The Robot's set_foot_target is one-shot (clears every tick), so the
      // UI re-asserts the chosen target at ~30 Hz while a leg is selected.
      // Switching the dropdown to "off" stops sending and the gait takes
      // back control of that leg on the next tick.
      const targetLegEl = document.getElementById("target-leg");
      const txEl = document.getElementById("tx");
      const tyEl = document.getElementById("ty");
      const tzEl = document.getElementById("tz");
      const txV  = document.getElementById("tx-v");
      const tyV  = document.getElementById("ty-v");
      const tzV  = document.getElementById("tz-v");
      function refreshTargetLabels() {
        txV.textContent = txEl.value;
        tyV.textContent = tyEl.value;
        tzV.textContent = tzEl.value;
      }
      [txEl, tyEl, tzEl].forEach(el =>
        el.addEventListener("input", refreshTargetLabels)
      );
      let footTargetTimer = null;
      function pushFootTarget() {
        const leg = targetLegEl.value;
        if (!leg) return;
        send({
          type: "set_foot_target",
          leg,
          x: parseFloat(txEl.value),
          y: parseFloat(tyEl.value),
          z: parseFloat(tzEl.value),
        });
      }
      function clampToSlider(el, v) {
        const min = parseFloat(el.min);
        const max = parseFloat(el.max);
        return Math.max(min, Math.min(max, v));
      }
      function prefillFromCurrent(legName) {
        if (!latestState || !latestState.legs[legName]) return;
        const foot = latestState.legs[legName].foot; // body frame [x,y,z]
        // Round to the slider's step (0.5) so the values look clean and the
        // sliders snap.
        const snap = (v) => Math.round(v * 2) / 2;
        txEl.value = clampToSlider(txEl, snap(foot[0]));
        tyEl.value = clampToSlider(tyEl, snap(foot[1]));
        tzEl.value = clampToSlider(tzEl, snap(foot[2]));
        refreshTargetLabels();
      }
      targetLegEl.addEventListener("change", () => {
        if (footTargetTimer) {
          clearInterval(footTargetTimer);
          footTargetTimer = null;
        }
        if (targetLegEl.value) {
          // Prefill the sliders with the current foot position so the very
          // first frame we send is a no-op rather than a teleport.
          prefillFromCurrent(targetLegEl.value);
          pushFootTarget();                              // immediate
          footTargetTimer = setInterval(pushFootTarget, 33);  // ~30 Hz
        }
      });

      function pushTwist() {
        if (keys[" "]) { send({ type: "stop" }); return; }
        const vx = (keys["w"] ? 15 : 0) - (keys["s"] ? 15 : 0);
        const vy = (keys["a"] ? 15 : 0) - (keys["d"] ? 15 : 0);
        const omega = (keys["q"] ? 1.5 : 0) - (keys["e"] ? 1.5 : 0);
        send({ type: "twist", vx, vy, omega });
      }

      // ─── render loop ───────────────────────────────────────────────
      function tick() {
        // Keep the shadow light centred on the robot.
        dirLight.position.set(
          bodyGroup.position.x + 30,
          bodyGroup.position.y + 20,
          40,
        );
        dirLight.target.position.copy(bodyGroup.position);
        dirLight.target.updateMatrixWorld();

        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(tick);
      }
      tick();
    </script>
  </body>
</html>
