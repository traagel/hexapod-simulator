# Per-servo calibration table for the DS3235SSG hexapod build.
#
# Each entry is a list of measured (commanded_deg, observed_pulse_us) samples,
# taken across the full 0..270° servo travel. Mechanical neutral sits at
# `zero_offset_deg` (= 135°), so an IK joint angle of 0 rad maps to that
# row in the table.
#
# Use piecewise-linear interpolation between samples when converting an IK
# angle to a pulse width — this captures per-servo zero offsets AND the
# slight nonlinearity at the ends of the travel that a single linear
# slope misses.
#
# Source: config/calibration/ds3235ssg.csv

servo: ds3235ssg
zero_offset_deg: 135

legs:
  front_left:
    coxa:   # LF1
      - {deg:   0, pulse_us:  490}
      - {deg:  45, pulse_us:  815}
      - {deg:  90, pulse_us: 1140}
