# Hexapod body and leg configuration.
# The body is symmetric: each segment defines (x, y) for the LEFT side,
# and the right side is mirrored (y -> -y).
# coxa.length and coxa.angle apply to all legs unless overridden.

height: 5.0

coxa:
  length: 5.0
  angle: 0.0

femur:
  length: 8.0
  angle: 0.0

tibia:
  length: 12.0
  angle: 0.0

mounts:
  front: [6.0, 4.0]
  mid: [0.0, 5.0]
  rear: [-6.0, 4.0]
